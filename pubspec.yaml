name: qui_go_au_bled
description: Application de transport de colis entre voyageurs - Marketplace mobile
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.2.0

  # Firebase (uniquement pour les notifications push FCM)
  firebase_core: ^2.27.0
  firebase_messaging: ^14.9.0

  # UI
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0

  # Utilities
  intl: ^0.20.0
  uuid: ^4.3.3
  equatable: ^2.0.5
  dartz: ^0.10.1

  # HTTP Client (PostgreSQL Railway API)
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # Notifications
  flutter_local_notifications: ^17.0.0

  # Share
  share_plus: ^7.2.1

  # URL Launcher
  url_launcher: ^6.2.4

  # Form
  flutter_form_builder: ^10.3.0
  form_builder_validators: ^11.1.2

  # JSON
  json_annotation: ^4.8.1

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # Connectivity
  connectivity_plus: ^5.0.2

  # Permission
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
