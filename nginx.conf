events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen ${PORT};
        root /usr/share/nginx/html;
        index index.html;

        # Headers pour compatibilité Firefox + SharedArrayBuffer (Flutter CanvasKit)
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;

        # Flutter web SPA — toutes les routes redirigent vers index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # No cache for main Flutter entry points (no hash in filename)
        location ~* ^/(main\.dart\.js|flutter\.js|flutter_bootstrap\.js|flutter_service_worker\.js|index\.html)$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Cross-Origin-Resource-Policy "cross-origin" always;
        }

        # Cache agressif pour les assets Flutter (hash dans le nom)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Cross-Origin-Resource-Policy "cross-origin" always;
        }
    }
}
